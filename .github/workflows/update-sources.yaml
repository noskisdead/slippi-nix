name: update sources

# Checks upstream Slippi repos for new releases and, when found, opens a PR that
# updates the pinned versions+hashes in _sources/ (generated by nvfetcher from
# nvfetcher.toml). The PR is gated by the usual `nix flake check` before merge.
on:
  schedule:
    # Daily at 07:00 UTC. Upstream releases are infrequent; this is cheap.
    - cron: "0 7 * * *"
  workflow_dispatch: {}

# Needed for peter-evans/create-pull-request to push a branch and open the PR.
permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    name: update sources
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v3

      - name: Run nvfetcher
        env:
          # nvchecker's `use_latest_release` source requires a GitHub token.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          keyfile="$(mktemp)"
          printf '[keys]\ngithub = "%s"\n' "$GH_TOKEN" > "$keyfile"
          nix run nixpkgs#nvfetcher -- --keyfile "$keyfile"
          rm -f "$keyfile"

      - name: Create pull request
        uses: peter-evans/create-pull-request@v6
        with:
          # Using the default GITHUB_TOKEN, the resulting PR will NOT trigger the
          # `nix flake check` workflow (a GitHub Actions safeguard). Set a
          # SLIPPI_UPDATE_TOKEN secret (a PAT with repo scope) to have CI run on
          # the PR automatically; otherwise re-run checks manually before merge.
          token: ${{ secrets.SLIPPI_UPDATE_TOKEN || secrets.GITHUB_TOKEN }}
          branch: automated/update-sources
          delete-branch: true
          add-paths: _sources/
          commit-message: "chore: update slippi sources"
          title: "chore: update slippi sources"
          body: |
            Automated update of the pinned Slippi release artifacts.

            Generated by `nvfetcher` from `nvfetcher.toml`. Review the version
            changes in `_sources/generated.nix`, ensure `nix flake check` is
            green, then merge.
